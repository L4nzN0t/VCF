formatVersion: 2
name: vcf-902-sftp-server
version: 1
inputs:
  vmName:
    type: string
    title: Server Name
    description: Lowercase DNS-safe name for the SFTP endpoint.
    minLength: 3
    maxLength: 15
    pattern: ^[a-z][a-z0-9-]{1,13}[a-z0-9]$
  namespaceName:
    type: string
    title: Namespace
    description: Existing Supervisor namespace used as the deployment target.
    $data: /data/namespaces?projectId={{project}}
  storageClass:
    type: string
    title: Storage Class
    $data: /data/storageclasses?namespace={{namespaceName}}
  vmClass:
    type: string
    title: Virtual Machine Size
    description: Select an allowed VM class for the target namespace.
    $data: /data/virtualmachineclasses?namespace={{namespaceName}}
  subnetName:
    type: string
    title: Virtual Machine Subnet
    description: Existing Supervisor Subnet resource used by the VM network interface.
    default: subnet-vm-app-private
    enum:
      - subnet-vm-app-public
      - subnet-vm-app-private
  linuxImage:
    type: string
    title: Linux Image
    description: Supervisor VM image name for the SFTP guest.
    default: vmi-4dcd43492500fbe61
    oneOf:
      - title: Ubuntu Server 22.04
        const: vmi-4dcd43492500fbe61
      - title: Ubuntu Server 24.04
        const: ubuntu-2404
  # PvcSize:
  #   type: integer
  #   title: SFTP Volume Size (GB)
  #   description: Size of the persistent volume for SFTP storage.
  #   default: 10
  #   minimum: 1
  #   maximum: 100
  adminUsername:
    type: string
    title: Admin SSH User
    default: cloudadmin
    minLength: 2
    maxLength: 32
    pattern: ^[a-z_][a-z0-9_-]*$
  # sftpUsername:
  #   type: string
  #   title: SFTP User
  #   default: sftpuser
  #   minLength: 2
  #   maxLength: 32
  #   pattern: ^[a-z_][a-z0-9_-]*$
  # sftpPassword:
  #   type: string
  #   encrypted: true
  #   title: SFTP Password
  # allowPasswordlessSudo:
  #   type: boolean
  #   title: Allow Admin Passwordless Sudo
  #   default: true
variables:
  hostname: ${to_lower(input.vmName)}
  domainName: ${propgroup.domainName.domainController}
  namespace: ${input.namespaceName}
  storageClass: ${input.storageClass}
  fqdn: ${variable.hostname}.${variable.domainName}
  dnsZone: ${propgroup.domainName.dnsZone}
  dnsServer01: ${propgroup.dnsServers.dnsServer01}
  isPrivateSubnet: ${input.subnetName == 'subnet-vm-app-private'}
  sshServiceName: svc-${variable.hostname}-ssh
  commonLabels:
    app.kubernetes.io/name: ubuntu-vm
    app.kubernetes.io/instance: ${variable.hostname}
    vcf.vm/vmName: ${variable.hostname}
    vcf.vm/owner: ${split(env.requestedBy, '@')[0]}
  commonAnnotations:
    vcf.vm/requestedBy: ${env.requestedBy}
    vcf.vm/domainName: ${variable.domainName}
    vcf.vm/dnsZone: ${variable.dnsZone}
    vcf.vm/subnetName: ${input.subnetName}
resources:
  SupervisorNamespace:
    type: CCI.Supervisor.Namespace
    properties:
      name: ${variable.namespace}
      existing: true
  SshService:
    type: CCI.Supervisor.Resource
    properties:
      count: ${variable.isPrivateSubnet ? 1:0}
      context: ${resource.SupervisorNamespace.id}
      manifest:
        apiVersion: vmoperator.vmware.com/v1alpha3
        kind: VirtualMachineService
        metadata:
          name: ${variable.sshServiceName}
          namespace: ${variable.namespace}
          labels: ${variable.commonLabels}
        spec:
          type: LoadBalancer
          selector:
            app.kubernetes.io/instance: ${variable.hostname}
          ports:
            - name: ssh
              port: 22
              protocol: TCP
              targetPort: 22
  BootstrapSecret:
    type: CCI.Supervisor.Resource
    properties:
      context: ${resource.SupervisorNamespace.id}
      manifest:
        apiVersion: v1
        kind: Secret
        metadata:
          name: vm-${variable.hostname}-bootstrap
          namespace: ${variable.namespace}
          labels: ${variable.commonLabels}
        type: Opaque
        stringData:
          adminPassword: ${secret.linux-admin-password}
  UbuntuVM:
    type: CCI.Supervisor.Resource
    dependsOn:
      - BootstrapSecret
    properties:
      context: ${resource.SupervisorNamespace.id}
      wait:
        conditions:
          - type: VirtualMachineCreated
            status: 'True'
          - type: GuestCustomization
            status: 'True'
      manifest:
        apiVersion: vmoperator.vmware.com/v1alpha3
        kind: VirtualMachine
        metadata:
          name: ${variable.hostname}
          namespace: ${variable.namespace}
          labels: ${variable.commonLabels}
          annotations: ${variable.commonAnnotations}
        spec:
          className: ${input.vmClass}
          imageName: ${input.linuxImage}
          storageClass: ${variable.storageClass}
          powerState: PoweredOn
          network:
            interfaces:
              - name: eth0
                network:
                  name: ${input.subnetName}
                  kind: Subnet
            hostName: ${variable.hostname}
            domainName: ${variable.domainName}
            nameservers:
              - ${variable.dnsServer01}
            searchDomains:
              - ${variable.domainName}
          bootstrap:
            cloudInit:
              cloudConfig:
                #cloud-config
                package_update: true
                packages:
                  - openssh-server
                disable_root: false
                ssh_pwauth: true
                users:
                  - name: ${input.adminUsername}
                    shell: /bin/bash
                    lock_passwd: false
                    sudo: ALL=(ALL) ALL
                    passwd:
                      name: vm-${variable.hostname}-bootstrap
                      key: adminPassword
                # write_files:
                #   - path: /etc/ssh/sshd_config.d/sftp_config.conf
                #     owner: root:root
                #     permissions: '0644'
                #     content: |
                #       Match Group sftpusers
                #         ChrootDirectory /sftp
                #         PasswordAuthentication yes
                #         PermitTunnel no
                #         AllowAgentForwarding no
                #         X11Forwarding no
                #         AllowTcpForwarding yes
                #         ForceCommand internal-sftp
                # runcmd:
                #   - |
                #     set -eu
                #     disk="$(lsblk -dnpo NAME,TYPE,MOUNTPOINT | awk '$2=="disk" && $3=="" {print $1}' | tail -n 1)"
                #     if [ -n "$disk" ]; then
                #       if ! blkid "$disk"; then
                #         mkfs.ext4 -F "$disk"
                #       fi
                #       mkdir -p /sftp
                #       uuid="$(blkid -s UUID -o value "$disk")"
                #       if ! grep -q "$uuid" /etc/fstab; then
                #         echo "UUID=$uuid /sftp ext4 defaults,nofail 0 2" >> /etc/fstab
                #       fi
                #       mount /sftp
                #     fi
                #   - mkdir -p /sftp/upload
                #   - chown root:root /sftp
                #   - chmod 755 /sftp /sftp/upload
                #   - chown ${input.sftpUsername}:sftpusers /sftp/upload
                #   - chmod 750 /sftp/upload
                #   - systemctl enable ssh || systemctl enable sshd || true
                #   - systemctl restart ssh || systemctl restart sshd || true
outputs:
  hostname:
    value: ${variable.hostname}
  fqdn:
    value: ${variable.fqdn}
  namespace:
    value: ${variable.namespace}
  subnetName:
    value: ${input.subnetName}
  networkAccess:
    value: ${variable.isPrivateSubnet ? 'private-load-balancer':'public-direct'}
  ipAddress:
    value: ${variable.isPrivateSubnet ? resource.SshService[0].object.status.loadBalancer.ingress[0].ip:resource.UbuntuVM.object.status.network.primaryIP4}
  sshServiceName:
    value: ${variable.isPrivateSubnet ? variable.sshServiceName:'not-required'}
  sshEndpoint:
    value: ${variable.isPrivateSubnet ? resource.SshService[0].object.status.loadBalancer.ingress[0].ip + ':22':resource.UbuntuVM.object.status.network.primaryIP4 + ':22'}
  __deploymentOverview:
    value: |-
      ## Ubuntu VM Deployment

      Your Ubuntu virtual machine deployment completed successfully.

      #### Machine Summary

      | Field | Value |
      | --- | --- |
      | Name | ${variable.hostname} |
      | FQDN | ${variable.fqdn} |
      | Operating System | Ubuntu |
      | Image | ${input.linuxImage} |
      | Requested By | ${env.requestedBy} |
      | Namespace | ${variable.namespace} |
      | VM Class | ${input.vmClass} |
      | Storage Class | ${input.storageClass} |

      #### Network and SSH Access

      | Field | Value |
      | --- | --- |
      | Subnet | ${input.subnetName} |
      | Access Type | ${variable.isPrivateSubnet ? 'Private subnet through load balancer':'Direct public subnet access'} |
      | IP Address | ${variable.isPrivateSubnet ? resource.SshService[0].object.status.loadBalancer.ingress[0].ip:resource.UbuntuVM.object.status.network.primaryIP4} |
      | SSH Endpoint | ${variable.isPrivateSubnet ? resource.SshService[0].object.status.loadBalancer.ingress[0].ip + ':22':resource.UbuntuVM.object.status.network.primaryIP4 + ':22'} |
      | Load Balancer Service | ${variable.isPrivateSubnet ? variable.sshServiceName:'Not required'} |
      | Admin SSH User | ${input.adminUsername} |
      | DNS Domain | ${variable.domainName} |
      | DNS Zone | ${variable.dnsZone} |
      | Name Server | ${variable.dnsServer01} |
postDeploymentPayload:
  value:
    vmName: ${variable.hostname}
    fqdn: ${variable.fqdn}
    namespace: ${variable.namespace}
    osType: linux
    workloadType: ubuntu-vm
    requestedBy: ${env.requestedBy}
    domainName: ${variable.domainName}
    dnsZone: ${variable.dnsZone}
    vmClass: ${input.vmClass}
    storageClass: ${input.storageClass}
    linuxImage: ${input.linuxImage}
    subnetName: ${input.subnetName}
    networkAccess: ${variable.isPrivateSubnet ? 'private-load-balancer':'public-direct'}
    sshServiceName: ${variable.isPrivateSubnet ? variable.sshServiceName:'not-required'}
    ipAddress: ${variable.isPrivateSubnet ? resource.SshService[0].object.status.loadBalancer.ingress[0].ip:resource.UbuntuVM.object.status.network.primaryIP4}
    dnsRecord:
      action: create
      type: A
      name: ${variable.hostname}
      zone: ${variable.dnsZone}
      fqdn: ${variable.fqdn}
      address: ${variable.isPrivateSubnet ? resource.SshService[0].object.status.loadBalancer.ingress[0].ip:resource.UbuntuVM.object.status.network.primaryIP4}
    labelPatch:
      vcf.vm/ipAddress: ${variable.isPrivateSubnet ? resource.SshService[0].object.status.loadBalancer.ingress[0].ip:resource.UbuntuVM.object.status.network.primaryIP4}
      vcf.vm/fqdn: ${variable.fqdn}
    vCenterTags:
      app.kubernetes.io/name: ubuntu-vm
      app.kubernetes.io/instance: ${variable.hostname}
      vcf.vm/vmName: ${variable.hostname}
      vcf.vm/owner: ${split(env.requestedBy, '@')[0]}
