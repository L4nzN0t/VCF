formatVersion: 2
name: vcf-902-windows-vm-custom-network
version: 1

inputs:
  vmName:
    type: string
    title: Virtual Machine Name
    description: Lowercase DNS-safe name. Windows NetBIOS names should stay at 15 characters or less.
    minLength: 3
    maxLength: 15
    pattern: ^[a-z][a-z0-9-]{1,13}[a-z0-9]$

  application:
    type: string
    title: Application
    minLength: 2
    maxLength: 32
    pattern: ^[A-Za-z0-9][A-Za-z0-9_-]*$

  environment:
    type: string
    title: Environment
    default: dev
    oneOf:
      - title: Development
        const: dev
      - title: Test
        const: test
      - title: Production
        const: prod

  location:
    type: string
    title: vCenter / Workload Domain
    oneOf:
      - title: Lab05 Mgmt-01
        const: MGMT
      - title: Lab05 Wld-01
        const: WL1
      - title: Lab05 Wld-02
        const: WL2

  namespaceName:
    type: string
    title: Namespace
    description: Existing Supervisor namespace used as the deployment target.
    $data: /data/namespaces?projectId={{project}}

  vpcName:
    type: string
    title: VPC
    description: VPC associated with the selected namespace. Used by post-deployment validation, IPAM, DNS, and tagging automation.
    enum:
      - vpc-cbre
    default: vpc-cbre

  subnetName:
    type: string
    title: Subnet
    description: Subnet or segment associated with the selected namespace/VPC.

  useStaticIp:
    type: boolean
    title: Request Static IP
    default: false

  requestedIpAddress:
    type: string
    title: Requested IP Address
    description: Optional. Show this field in the custom form only when Request Static IP is enabled.
    default: ''
    pattern: '^$|^((25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})(\.|$)){4}$'

  subnetCidr:
    type: string
    title: Subnet CIDR
    description: Optional CIDR for validation and DNS/IPAM automation.
    default: ''

  gatewayAddress:
    type: string
    title: Gateway
    description: Optional gateway address for validation and documentation.
    default: ''
    pattern: '^$|^((25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})(\.|$)){4}$'

  storageClass:
    type: string
    title: Storage Class
    $data: /data/storageclasses?namespace={{namespaceName}}

  vmClass:
    type: string
    title: Virtual Machine Size
    description: Select an allowed VM class for the target namespace.
    $data: /data/virtualmachineclasses?namespace={{namespaceName}}

  windowsImage:
    type: string
    title: Windows Image
    default: vmi-3a69168e05f07ca5a
    oneOf:
      - title: Windows Server 2022
        const: vmi-3a69168e05f07ca5a

  domainName:
    type: string
    title: DNS / AD Domain
    default: lab.ncl
    oneOf:
      - title: lab.ncl
        const: lab.ncl
      - title: lanz.lab.ncl
        const: lanz.lab.ncl

  joinDomain:
    type: boolean
    title: Join AD Domain
    default: true

  adOuPath:
    type: string
    title: AD OU Path
    default: OU=Servers,OU=LAB,DC=lab,DC=ncl
    description: Distinguished name used by post-deployment AD automation if the image bootstrap cannot place the object.

  dnsZone:
    type: string
    title: DNS Zone
    default: lab.ncl

  ownerGroup:
    type: string
    title: Owner Group
    default: platform

  exposeRemoteAccess:
    type: boolean
    title: Expose Remote Access Load Balancer
    default: false

  remoteAccessSourceCidr:
    type: string
    title: Remote Access Source CIDR
    description: Optional. Use this in NSX/firewall post-deployment automation to restrict external access.
    default: ''

  requestedLeaseDays:
    type: integer
    title: Lease Days
    default: 30
    minimum: 1
    maximum: 365

variables:
  hostname: ${to_lower(input.vmName)}
  namespace: ${input.namespaceName}
  storageClass: ${input.storageClass}
  dnsServer01: 10.255.50.24
  dnsServer02: 10.255.50.26
  svcAccount: sa-svc-vcfa
  commonLabels:
    app.kubernetes.io/name: vm-lifecycle
    app.kubernetes.io/instance: ${variable.hostname}
    vcf.vm/vmName: ${variable.hostname}
    vcf.vm/application: ${input.application}
    vcf.vm/environment: ${input.environment}
    vcf.vm/owner: ${split(env.requestedBy, '@')[0]}
  commonAnnotations:
    vcf.vm/environment: ${input.environment}
    vcf.vm/requestedBy: ${env.requestedBy}
    vcf.vm/location: ${input.location}
    vcf.vm/domainName: ${input.domainName}
    vcf.vm/dnsZone: ${input.dnsZone}
    vcf.vm/adOuPath: ${input.adOuPath}
    vcf.vm/network.vpc: ${input.vpcName}
    vcf.vm/network.subnet: ${input.subnetName}
    vcf.vm/network.ipAssignment: ${input.useStaticIp ? 'static':'automatic'}
    vcf.vm/network.requestedIpAddress: ${input.requestedIpAddress}
    vcf.vm/network.subnetCidr: ${input.subnetCidr}
    vcf.vm/network.gatewayAddress: ${input.gatewayAddress}
    vcf.vm/network.remoteAccessSourceCidr: ${input.remoteAccessSourceCidr}
    vcf.vm/requestedLeaseDays: ${format('%d', input.requestedLeaseDays)}

resources:
  SupervisorNamespace:
    type: CCI.Supervisor.Namespace
    properties:
      name: ${variable.namespace}
      existing: true

  RemoteAccessService:
    type: CCI.Supervisor.Resource
    properties:
      count: ${input.exposeRemoteAccess ? 1:0}
      context: ${resource.SupervisorNamespace.id}
      manifest:
        apiVersion: vmoperator.vmware.com/v1alpha3
        kind: VirtualMachineService
        metadata:
          name: svc-${variable.hostname}
          namespace: ${variable.namespace}
          labels: ${variable.commonLabels}
          annotations:
            vcf.vm/network.remoteAccessSourceCidr: ${input.remoteAccessSourceCidr}
        spec:
          selector:
            app.kubernetes.io/instance: ${variable.hostname}
          type: LoadBalancer
          ports:
            - name: rdp
              port: 3389
              protocol: TCP
              targetPort: 3389
            - name: ssh
              port: 22
              protocol: TCP
              targetPort: 22

  BootstrapSecret:
    type: CCI.Supervisor.Resource
    properties:
      context: ${resource.SupervisorNamespace.id}
      manifest:
        apiVersion: v1
        kind: Secret
        metadata:
          name: vm-${variable.hostname}-bootstrap
          namespace: ${variable.namespace}
          labels: ${variable.commonLabels}
        type: Opaque
        stringData:
          localAdminPassword: ${secret.windows-bootstrap-password}
          domainAdminPassword: ${secret.ad-join-password}

  WindowsVM:
    type: CCI.Supervisor.Resource
    dependsOn:
      - BootstrapSecret
    properties:
      context: ${resource.SupervisorNamespace.id}
      wait:
        conditions:
          - type: VirtualMachineCreated
            status: 'True'
          - type: GuestCustomization
            status: 'True'
      manifest:
        apiVersion: vmoperator.vmware.com/v1alpha3
        kind: VirtualMachine
        metadata:
          name: ${variable.hostname}
          namespace: ${variable.namespace}
          labels: ${variable.commonLabels}
          annotations: ${variable.commonAnnotations}
        spec:
          className: ${input.vmClass}
          imageName: ${input.windowsImage}
          storageClass: ${variable.storageClass}
          powerState: PoweredOn
          network:
            hostName: ${variable.hostname}
            domainName: ${input.domainName}
            nameservers:
              - ${variable.dnsServer01}
              - ${variable.dnsServer02}
            searchDomains:
              - ${input.domainName}
            interfaces:
              - name: eth0
                network:
                  name: subnet-cbre-03
                  kind: Subnet
          bootstrap:
            sysprep:
              sysprep:
                guiUnattended:
                  autoLogon: false
                  password:
                    name: vm-${variable.hostname}-bootstrap
                    key: localAdminPassword
                userData:
                  fullName: ${split(env.requestedBy, '@')[0]}
                  orgName: VMware
                  computerName: ${variable.hostname}
                identification:
                  joinDomain: ${input.joinDomain ? input.domainName:''}
                  domainAdmin: ${input.joinDomain ? variable.svcAccount:''}
                  domainAdminPassword:
                    name: vm-${variable.hostname}-bootstrap
                    key: domainAdminPassword

outputs:
  hostname:
    value: ${variable.hostname}
  fqdn:
    value: ${variable.hostname}.${input.domainName}
  namespace:
    value: ${variable.namespace}
  requestedVpc:
    value: ${input.vpcName}
  requestedSubnet:
    value: ${input.subnetName}
  requestedIpAddress:
    value: ${input.useStaticIp ? input.requestedIpAddress:'automatic'}
  guestPrimaryIp:
    value: ${resource.WindowsVM.object.status.network.primaryIP4}
  remoteAccessServiceName:
    value: ${input.exposeRemoteAccess ? 'svc-' + variable.hostname:'not-exposed'}
  remoteAccessExternalIp:
    value: ${input.exposeRemoteAccess ? resource.RemoteAccessService[0].object.status.loadBalancer.ingress[0].ip:'not-exposed'}
  postDeploymentPayload:
    value:
      vmName: ${variable.hostname}
      fqdn: ${variable.hostname}.${input.domainName}
      namespace: ${variable.namespace}
      osType: windows
      environment: ${input.environment}
      application: ${input.application}
      requestedBy: ${env.requestedBy}
      domainName: ${input.domainName}
      domainJoinRequested: ${input.joinDomain}
      adOuPath: ${input.adOuPath}
      dnsZone: ${input.dnsZone}
      vmClass: ${input.vmClass}
      storageClass: ${input.storageClass}
      network:
        vpcName: ${input.vpcName}
        subnetName: ${input.subnetName}
        ipAssignment: ${input.useStaticIp ? 'static':'automatic'}
        requestedIpAddress: ${input.requestedIpAddress}
        subnetCidr: ${input.subnetCidr}
        gatewayAddress: ${input.gatewayAddress}
        guestPrimaryIp: ${resource.WindowsVM.object.status.network.primaryIP4}
      remoteAccessEnabled: ${input.exposeRemoteAccess}
      remoteAccessSourceCidr: ${input.remoteAccessSourceCidr}
      remoteAccessServiceName: ${input.exposeRemoteAccess ? 'svc-' + variable.hostname:'not-exposed'}
      remoteAccessExternalIp: ${input.exposeRemoteAccess ? resource.RemoteAccessService[0].object.status.loadBalancer.ingress[0].ip:'not-exposed'}
      labelPatch:
        vcf.vm/primaryIp: ${resource.WindowsVM.object.status.network.primaryIP4}
        vcf.vm/loadBalancerExternalIp: ${input.exposeRemoteAccess ? resource.RemoteAccessService[0].object.status.loadBalancer.ingress[0].ip:'not-exposed'}
      vCenterTags:
        app.kubernetes.io/name: vm-lifecycle
        app.kubernetes.io/instance: ${variable.hostname}
        vcf.vm/vmName: ${variable.hostname}
        vcf.vm/application: ${input.application}
        vcf.vm/environment: ${input.environment}
        vcf.vm/owner: ${split(env.requestedBy, '@')[0]}
        vcf.vm/vpc: ${input.vpcName}
        vcf.vm/subnet: ${input.subnetName}
  __deploymentOverview:
    value: |-
      ## Windows VM Deployment

      Your Windows virtual machine deployment completed successfully.

      ---

      #### Machine Summary

      <table class="table table-vertical table-compact">
        <tr>
          <th class="left">Name</th>
          <td><strong>${variable.hostname}</strong></td>
        </tr>
        <tr>
          <th class="left">FQDN</th>
          <td><code>${variable.hostname}.${input.domainName}</code></td>
        </tr>
        <tr>
          <th class="left">Operating System</th>
          <td><span class="label label-info">Windows Server</span></td>
        </tr>
        <tr>
          <th class="left">Application</th>
          <td>${input.application}</td>
        </tr>
        <tr>
          <th class="left">Environment</th>
          <td><span class="label label-default">${input.environment}</span></td>
        </tr>
        <tr>
          <th class="left">Requested By</th>
          <td>${env.requestedBy}</td>
        </tr>
        <tr>
          <th class="left">Namespace</th>
          <td><code>${variable.namespace}</code></td>
        </tr>
        <tr>
          <th class="left">VM Class</th>
          <td>${input.vmClass}</td>
        </tr>
        <tr>
          <th class="left">Storage Class</th>
          <td>${input.storageClass}</td>
        </tr>
      </table>

      ---

      #### Network Selection

      <table class="table table-vertical table-compact">
        <tr>
          <th class="left">VPC</th>
          <td><code>${input.vpcName}</code></td>
        </tr>
        <tr>
          <th class="left">Subnet</th>
          <td><code>${input.subnetName}</code></td>
        </tr>
        <tr>
          <th class="left">IP Assignment</th>
          <td>${input.useStaticIp ? 'static':'automatic'}</td>
        </tr>
        <tr>
          <th class="left">Requested IP</th>
          <td><code>${input.useStaticIp ? input.requestedIpAddress:'automatic'}</code></td>
        </tr>
        <tr>
          <th class="left">Guest Primary IP</th>
          <td><code>${resource.WindowsVM.object.status.network.primaryIP4}</code></td>
        </tr>
        <tr>
          <th class="left">Subnet CIDR</th>
          <td><code>${input.subnetCidr}</code></td>
        </tr>
        <tr>
          <th class="left">Gateway</th>
          <td><code>${input.gatewayAddress}</code></td>
        </tr>
        <tr>
          <th class="left">DNS Domain</th>
          <td>${input.domainName}</td>
        </tr>
        <tr>
          <th class="left">Name Servers</th>
          <td><code>${variable.dnsServer01}</code>, <code>${variable.dnsServer02}</code></td>
        </tr>
      </table>

      ---

      #### Remote Access

      <table class="table table-vertical table-compact">
        <tr>
          <th class="left">External Access</th>
          <td>${input.exposeRemoteAccess ? 'Enabled':'Disabled'}</td>
        </tr>
        <tr>
          <th class="left">Allowed Source CIDR</th>
          <td><code>${input.remoteAccessSourceCidr}</code></td>
        </tr>
        <tr>
          <th class="left">Load Balancer Service</th>
          <td><code>${input.exposeRemoteAccess ? 'svc-' + variable.hostname:'not-exposed'}</code></td>
        </tr>
        <tr>
          <th class="left">Load Balancer External IP</th>
          <td><code>${input.exposeRemoteAccess ? resource.RemoteAccessService[0].object.status.loadBalancer.ingress[0].ip:'not-exposed'}</code></td>
        </tr>
        <tr>
          <th class="left">RDP</th>
          <td><code>${input.exposeRemoteAccess ? resource.RemoteAccessService[0].object.status.loadBalancer.ingress[0].ip + ':3389':'internal network only'}</code></td>
        </tr>
      </table>

      ---

      #### Lifecycle Tasks

      <table class="table table-vertical table-compact">
        <tr>
          <th class="left">AD Domain Join</th>
          <td>${input.joinDomain ? 'Requested':'Not requested'}</td>
        </tr>
        <tr>
          <th class="left">Target OU</th>
          <td><code>${input.adOuPath}</code></td>
        </tr>
        <tr>
          <th class="left">DNS Record</th>
          <td>Handled by post-deployment automation</td>
        </tr>
        <tr>
          <th class="left">VM IP Label</th>
          <td><code>vcf.vm/primaryIp</code></td>
        </tr>
        <tr>
          <th class="left">LB IP Label</th>
          <td><code>vcf.vm/loadBalancerExternalIp</code></td>
        </tr>
        <tr>
          <th class="left">vCenter Tags</th>
          <td>Handled by post-deployment automation from the VM labels</td>
        </tr>
      </table>

      > VPC, subnet, requested IP, source CIDR, labels, and vCenter tags are passed as deployment intent. Use post-deployment automation to validate IP allocation, patch labels, create DNS records, restrict access, and apply vCenter tags.
