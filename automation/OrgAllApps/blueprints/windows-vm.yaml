formatVersion: 2
name: vcf-902-vm-lifecycle
version: 1
inputs:
  vmName:
    type: string
    title: Virtual Machine Name
    description: Lowercase DNS-safe name. Windows NetBIOS names should stay at 15 characters or less.
    minLength: 3
    maxLength: 15
    pattern: ^[a-z][a-z0-9-]{1,13}[a-z0-9]$
  location:
    type: string
    title: vCenter / Workload Domain
    oneOf:
      - title: Lab05 Mgmt-01
        const: MGMT
      - title: Lab05 Wld-01
        const: WL1
      - title: Lab05 Wld-02
        const: WL2
  namespaceName:
    type: string
    title: Namespace
    description: Existing Supervisor namespace used as the deployment target.
    $data: /data/namespaces?projectId={{project}}
  storageClass:
    type: string
    title: Storage Class
    $data: /data/storageclasses?namespace={{namespaceName}}
  vmClass:
    type: string
    title: Virtual Machine Size
    description: Select an allowed VM class for the target namespace.
    $data: /data/virtualmachineclasses?namespace={{namespaceName}}
  windowsImage:
    type: string
    title: Windows Image
    default: vmi-0e7952223128644bc
    oneOf:
      - title: Windows Server 2022
        const: vmi-0e7952223128644bc
  additionalDisks:
    type: array
    title: Additional Disks
    description: Optional data disks to be created, attached, and initialized by post-deployment automation.
    default: []
    minItems: 0
    maxItems: 3
    items:
      type: object
      required:
        - driveLetter
        - driveName
        - sizeGb
      properties:
        driveLetter:
          type: string
          title: Drive Letter
          minLength: 1
          maxLength: 1
          pattern: ^[D-Z]$
        driveName:
          type: string
          title: Drive Name
          minLength: 1
          maxLength: 32
          pattern: ^[A-Za-z0-9][A-Za-z0-9_-]*$
        sizeGb:
          type: integer
          title: Size (GB)
          minimum: 1
          maximum: 4096
  application:
    type: string
    title: Application
    oneOf:
      - title: Application (All Servers other than websites)
        const: AP
      - title: Citrix
        const: CX
      - title: Database
        const: DB
      - title: Domain Controllers
        const: DC
      - title: Exchange
        const: EX
      - title: File Server or File System
        const: FS
      - title: Proof of Concept
        const: PC
      - title: Security
        const: SC
      - title: Web Server
        const: WB

  environment:
    type: string
    title: Environment
    default: prod
    oneOf:
      - title: Non-Production
        const: non-prod
      - title: Production
        const: prod

  ownerGroup:
    type: string
    title: Owner Group

  domainName:
    type: string
    title: DNS / AD Domain
    default: lab.ncl
    oneOf:
      - title: lab.ncl
        const: lab.ncl
      - title: lanz.lab.ncl
        const: lanz.lab.ncl

  joinDomain:
    type: boolean
    title: Join AD Domain
    default: true

  exposeRemoteAccess:
    type: boolean
    title: Expose Remote Access Load Balancer
    default: true

variables:
  hostname: ${to_lower(input.vmName)}
  namespace: ${input.namespaceName}
  storageClass: ${input.storageClass}
  dnsServer01: ${propgroup.dnsServers.dnsServer01}
  svcAccount: sa-svc-vcfa
  commonLabels:
    app.kubernetes.io/name: vm-lifecycle
    app.kubernetes.io/instance: ${variable.hostname}
    vcf.vm/vmName: ${variable.hostname}
    vcf.vm/application: ${input.application}
    vcf.vm/environment: ${input.environment}
    vcf.vm/owner: ${split(env.requestedBy, '@')[0]}
  commonAnnotations:
    vcf.vm/environment: ${input.environment}
    vcf.vm/requestedBy: ${env.requestedBy}
    vcf.vm/location: ${input.location}
    vcf.vm/domainName: ${input.domainName}

resources:
  SupervisorNamespace:
    type: CCI.Supervisor.Namespace
    properties:
      name: ${variable.namespace}
      existing: true

  RemoteAccessService:
    type: CCI.Supervisor.Resource
    properties:
      count: ${input.exposeRemoteAccess ? 1:0}
      context: ${resource.SupervisorNamespace.id}
      manifest:
        apiVersion: vmoperator.vmware.com/v1alpha3
        kind: VirtualMachineService
        metadata:
          name: svc-${variable.hostname}
          namespace: ${variable.namespace}
          labels: ${variable.commonLabels}
        spec:
          selector:
            app.kubernetes.io/instance: ${variable.hostname}
          type: LoadBalancer
          ports:
            - name: rdp
              port: 3389
              protocol: TCP
              targetPort: 3389
            - name: ssh
              port: 22
              protocol: TCP
              targetPort: 22

  BootstrapSecret:
    type: CCI.Supervisor.Resource
    properties:
      context: ${resource.SupervisorNamespace.id}
      manifest:
        apiVersion: v1
        kind: Secret
        metadata:
          name: vm-${variable.hostname}-bootstrap
          namespace: ${variable.namespace}
          labels: ${variable.commonLabels}
        type: Opaque
        stringData:
          localAdminPassword: ${secret.windows-bootstrap-password}
          domainAdminPassword: ${secret.ad-join-password}

  DataDiskPVC01:
    type: CCI.Supervisor.Resource
    properties:
      count: ${length(input.additionalDisks) > 0 ? 1:0}
      context: ${resource.SupervisorNamespace.id}
      manifest:
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: pvc-${variable.hostname}-${to_lower(input.additionalDisks[0].driveLetter)}
          namespace: ${variable.namespace}
          labels: ${variable.commonLabels}
          annotations:
            vcf.vm/disk.driveLetter: ${input.additionalDisks[0].driveLetter}
            vcf.vm/disk.driveName: ${input.additionalDisks[0].driveName}
            vcf.vm/disk.sizeGb: ${format('%d', input.additionalDisks[0].sizeGb)}
        spec:
          accessModes:
            - ReadWriteOnce
          storageClassName: ${variable.storageClass}
          resources:
            requests:
              storage: ${format('%dGi', input.additionalDisks[0].sizeGb)}

  DataDiskPVC02:
    type: CCI.Supervisor.Resource
    properties:
      count: ${length(input.additionalDisks) > 1 ? 1:0}
      context: ${resource.SupervisorNamespace.id}
      manifest:
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: pvc-${variable.hostname}-${to_lower(input.additionalDisks[1].driveLetter)}
          namespace: ${variable.namespace}
          labels: ${variable.commonLabels}
          annotations:
            vcf.vm/disk.driveLetter: ${input.additionalDisks[1].driveLetter}
            vcf.vm/disk.driveName: ${input.additionalDisks[1].driveName}
            vcf.vm/disk.sizeGb: ${format('%d', input.additionalDisks[1].sizeGb)}
        spec:
          accessModes:
            - ReadWriteOnce
          storageClassName: ${variable.storageClass}
          resources:
            requests:
              storage: ${format('%dGi', input.additionalDisks[1].sizeGb)}

  DataDiskPVC03:
    type: CCI.Supervisor.Resource
    properties:
      count: ${length(input.additionalDisks) > 2 ? 1:0}
      context: ${resource.SupervisorNamespace.id}
      manifest:
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: pvc-${variable.hostname}-${to_lower(input.additionalDisks[2].driveLetter)}
          namespace: ${variable.namespace}
          labels: ${variable.commonLabels}
          annotations:
            vcf.vm/disk.driveLetter: ${input.additionalDisks[2].driveLetter}
            vcf.vm/disk.driveName: ${input.additionalDisks[2].driveName}
            vcf.vm/disk.sizeGb: ${format('%d', input.additionalDisks[2].sizeGb)}
        spec:
          accessModes:
            - ReadWriteOnce
          storageClassName: ${variable.storageClass}
          resources:
            requests:
              storage: ${format('%dGi', input.additionalDisks[2].sizeGb)}

  WindowsVM:
    type: CCI.Supervisor.Resource
    dependsOn:
      - BootstrapSecret
      - DataDiskPVC01
      - DataDiskPVC02
      - DataDiskPVC03
    properties:
      context: ${resource.SupervisorNamespace.id}
      wait:
        conditions:
          - type: VirtualMachineCreated
            status: 'True'
          - type: GuestCustomization
            status: 'True'
      manifest:
        apiVersion: vmoperator.vmware.com/v1alpha3
        kind: VirtualMachine
        metadata:
          name: ${variable.hostname}
          namespace: ${variable.namespace}
          labels: ${variable.commonLabels}
          annotations: ${variable.commonAnnotations}
        spec:
          className: ${input.vmClass}
          imageName: ${input.windowsImage}
          storageClass: ${variable.storageClass}
          powerState: PoweredOn
          volumes: '${map_by(input.additionalDisks, disk => {''name'':''pvc-'' + variable.hostname + ''-'' + to_lower(disk.driveLetter), ''persistentVolumeClaim'': {''claimName'':''pvc-'' + variable.hostname + ''-'' + to_lower(disk.driveLetter)}})}'
          network:
            hostName: ${variable.hostname}
            domainName: ${input.domainName}
            nameservers:
              - ${variable.dnsServer01}
            searchDomains:
              - ${input.domainName}
          bootstrap:
            sysprep:
              sysprep:
                guiUnattended:
                  autoLogon: true
                  autoLogonCount: 1
                  password:
                    name: vm-${variable.hostname}-bootstrap
                    key: localAdminPassword
                guiRunOnce:
                  commands: '${map_by(input.additionalDisks, disk => ''powershell.exe -NoProfile -ExecutionPolicy Bypass -Command "$disk = Get-Disk | Where-Object PartitionStyle -eq RAW | Sort-Object Number | Select-Object -First 1; if ($null -ne $disk) { Initialize-Disk -Number $disk.Number -PartitionStyle GPT -PassThru | New-Partition -DriveLetter '' + disk.driveLetter + '' -UseMaximumSize | Format-Volume -FileSystem NTFS -NewFileSystemLabel '' + disk.driveName + '' -Confirm:$false }"'')}'
                userData:
                  fullName: ${split(env.requestedBy, '@')[0]}
                  orgName: VMware
                  computerName: ${variable.hostname}
                identification:
                  joinDomain: ${input.joinDomain ? input.domainName:''}
                  domainAdmin: ${input.joinDomain ? variable.svcAccount:''}
                  domainAdminPassword:
                    name: vm-${variable.hostname}-bootstrap
                    key: domainAdminPassword

outputs:
  hostname:
    value: ${variable.hostname}.${input.domainName}
  namespace:
    value: ${variable.namespace}
  remoteAccessServiceName:
    value: ${input.exposeRemoteAccess ? 'lb-svc-' + variable.hostname:'not-exposed'}
  remoteAccessExternalIp:
    value: ${input.exposeRemoteAccess ? resource.RemoteAccessService[0].object.status.loadBalancer.ingress[0].ip:'not-exposed'}
  additionalDisks:
    value: ${input.additionalDisks}
postDeploymentPayload:
  value:
    vmName: ${variable.hostname}
    fqdn: ${variable.hostname}.${input.domainName}
    namespace: ${variable.namespace}
    osType: windows
    environment: ${input.environment}
    application: ${input.application}
    requestedBy: ${env.requestedBy}
    domainName: ${input.domainName}
    domainJoinRequested: ${input.joinDomain}
    dnsZone: ${input.domainName}
    vmClass: ${input.vmClass}
    storageClass: ${input.storageClass}
    additionalDisksRequested: ${length(input.additionalDisks) > 0}
    additionalDisks: ${input.additionalDisks}
    remoteAccessEnabled: ${input.exposeRemoteAccess}
    remoteAccessServiceName: ${input.exposeRemoteAccess ? 'lb-svc-' + variable.hostname:'not-exposed'}
    remoteAccessExternalIp: ${input.exposeRemoteAccess ? resource.RemoteAccessService[0].object.status.loadBalancer.ingress[0].ip:'not-exposed'}
    labelPatch:
      vcf.vm/loadBalancerExternalIp: ${input.exposeRemoteAccess ? resource.RemoteAccessService[0].object.status.loadBalancer.ingress[0].ip:'not-exposed'}
    vCenterTags:
      app.kubernetes.io/name: vm-lifecycle
      app.kubernetes.io/instance: ${variable.hostname}
      vcf.vm/vmName: ${variable.hostname}
      vcf.vm/application: ${input.application}
      vcf.vm/environment: ${input.environment}
      vcf.vm/owner: ${split(env.requestedBy, '@')[0]}
  __deploymentOverview:
    value: |-
      ## 🖥️ Virtual Machine Deployment

      Your virtual machine deployment completed successfully.

      ---

      #### Machine Summary

      <table class="table table-vertical table-compact">
        <tr>
          <th class="left">Name</th>
          <td><strong>${variable.hostname}</strong></td>
        </tr>
        <tr>
          <th class="left">FQDN</th>
          <td><code>${variable.hostname}.${input.domainName}</code></td>
        </tr>
        <tr>
          <th class="left">Operating System</th>
          <td><span class="label label-info">Windows Server</span></td>
        </tr>
        <tr>
          <th class="left">Application</th>
          <td>${input.application}</td>
        </tr>
        <tr>
          <th class="left">Environment</th>
          <td><span class="label label-default">${input.environment}</span></td>
        </tr>
        <tr>
          <th class="left">Requested By</th>
          <td>${env.requestedBy}</td>
        </tr>
        <tr>
          <th class="left">Namespace</th>
          <td><code>${variable.namespace}</code></td>
        </tr>
        <tr>
          <th class="left">VM Class</th>
          <td>${input.vmClass}</td>
        </tr>
        <tr>
          <th class="left">Storage Class</th>
          <td>${input.storageClass}</td>
        </tr>
        <tr>
          <th class="left">Additional Disks</th>
          <td>${length(input.additionalDisks)}</td>
        </tr>
      </table>

      ---

      #### Network and Access

      <table class="table table-vertical table-compact">
        <tr>
          <th class="left">DNS Domain</th>
          <td>${input.domainName}</td>
        </tr>
        <tr>
          <th class="left">DNS Zone</th>
          <td>${input.dnsZone}</td>
        </tr>
        <tr>
          <th class="left">Name Servers</th>
          <td><code>${variable.dnsServer01}</code></td>
        </tr>
        <tr>
          <th class="left">Remote Access</th>
          <td>${input.exposeRemoteAccess ? 'Enabled':'Disabled'}</td>
        </tr>
        <tr>
          <th class="left">Load Balancer Service</th>
          <td><code>${input.exposeRemoteAccess ? 'svc-' + variable.hostname:'not-exposed'}</code></td>
        </tr>
        <tr>
          <th class="left">Load Balancer External IP</th>
          <td><code>${input.exposeRemoteAccess ? resource.RemoteAccessService[0].object.status.loadBalancer.ingress[0].ip:'not-exposed'}</code></td>
        </tr>
        <tr>
          <th class="left">RDP</th>
          <td><code>${input.exposeRemoteAccess ? resource.RemoteAccessService[0].object.status.loadBalancer.ingress[0].ip + ':3389':'internal network only'}</code></td>
        </tr>
        <tr>
          <th class="left">SSH</th>
          <td><code>${input.exposeRemoteAccess ? resource.RemoteAccessService[0].object.status.loadBalancer.ingress[0].ip + ':22':'internal network only'}</code></td>
        </tr>
      </table>

      ---

      #### Lifecycle Tasks

      <table class="table table-vertical table-compact">
        <tr>
          <th class="left">AD Domain Join</th>
          <td>${input.joinDomain ? 'Requested':'Not requested'}</td>
        </tr>
        <tr>
          <th class="left">DNS Record</th>
          <td>Handled by post-deployment automation</td>
        </tr>
        <tr>
          <th class="left">LB IP Label</th>
          <td><code>vcf.vm/loadBalancerExternalIp</code></td>
        </tr>
        <tr>
          <th class="left">vCenter Tags</th>
          <td>Handled by post-deployment automation from the VM labels</td>
        </tr>
      </table>

      > If the load balancer IP is blank, refresh the deployment after the Supervisor load balancer controller assigns an external address.
