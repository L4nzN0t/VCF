formatVersion: 2
name: vcf-902-sftp-server
version: 1
inputs:
  vmName:
    type: string
    title: SFTP Server Name
    description: Lowercase DNS-safe name for the SFTP endpoint.
    minLength: 3
    maxLength: 15
    pattern: ^[a-z][a-z0-9-]{1,13}[a-z0-9]$
  namespaceName:
    type: string
    title: Namespace
    description: Existing Supervisor namespace used as the deployment target.
    $data: /data/namespaces?projectId={{project}}
  storageClass:
    type: string
    title: Storage Class
    $data: /data/storageclasses?namespace={{namespaceName}}
  vmClass:
    type: string
    title: Virtual Machine Size
    description: Select an allowed VM class for the target namespace.
    $data: /data/virtualmachineclasses?namespace={{namespaceName}}
  linuxImage:
    type: string
    title: Linux Image
    description: Supervisor VM image name for the SFTP guest.
    default: vmi-4dcd43492500fbe61
    oneOf:
      - title: Ubuntu Server 22.04
        const: vmi-4dcd43492500fbe61
      - title: Ubuntu Server 24.04
        const: ubuntu-2404
  sftpPvcSize:
    type: integer
    title: SFTP Volume Size (GB)
    description: Size of the persistent volume for SFTP storage.
    default: 10
    minimum: 1
    maximum: 100
  adminUsername:
    type: string
    title: Admin SSH User
    default: cloudadmin
    minLength: 2
    maxLength: 32
    pattern: ^[a-z_][a-z0-9_-]*$
  sftpUsername:
    type: string
    title: SFTP User
    default: sftpuser
    minLength: 2
    maxLength: 32
    pattern: ^[a-z_][a-z0-9_-]*$
  sftpPassword:
    type: string
    encrypted: true
    title: SFTP Password
  allowPasswordlessSudo:
    type: boolean
    title: Allow Admin Passwordless Sudo
    default: true
variables:
  hostname: ${to_lower(input.vmName)}
  domainName: ${propgroup.domainName.domainController}
  namespace: ${input.namespaceName}
  storageClass: ${input.storageClass}
  fqdn: ${variable.hostname}.${variable.domainName}
  dnsZone: ${propgroup.domainName.dnsZone}
  dnsServer01: ${propgroup.dnsServers.dnsServer01}
  commonLabels:
    app.kubernetes.io/name: sftp-server
    app.kubernetes.io/instance: ${variable.hostname}
    vcf.vm/vmName: ${variable.hostname}
    vcf.vm/owner: ${split(env.requestedBy, '@')[0]}
  commonAnnotations:
    vcf.vm/requestedBy: ${env.requestedBy}
    vcf.vm/domainName: ${variable.domainName}
    vcf.vm/dnsZone: ${variable.dnsZone}
    vcf.vm/sftpUser: ${input.sftpUsername}
resources:
  SupervisorNamespace:
    type: CCI.Supervisor.Namespace
    properties:
      name: ${variable.namespace}
      existing: true
  sftpService:
    type: CCI.Supervisor.Resource
    properties:
      context: ${resource.SupervisorNamespace.id}
      manifest:
        apiVersion: vmoperator.vmware.com/v1alpha3
        kind: VirtualMachineService
        metadata:
          name: svc-${variable.hostname}-sftp
          namespace: ${variable.namespace}
          labels: ${variable.commonLabels}
        spec:
          type: LoadBalancer
          selector:
            app.kubernetes.io/instance: ${variable.hostname}
          ports:
            - name: sftp
              port: 22
              protocol: TCP
              targetPort: 22
  sftpSecret:
    type: CCI.Supervisor.Resource
    properties:
      context: ${resource.SupervisorNamespace.id}
      manifest:
        apiVersion: v1
        kind: Secret
        metadata:
          name: ${variable.hostname}-secret
          namespace: ${variable.namespace}
          labels: ${variable.commonLabels}
        stringData:
          adminPassword: ${secret.linux-admin-password}
          sftpPassword: ${secret.sftp-user-password}
  sftpPvc:
    type: CCI.Supervisor.Resource
    properties:
      context: ${resource.SupervisorNamespace.id}
      manifest:
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: pvc-sftp-${variable.hostname}
          namespace: ${variable.namespace}
          labels: ${variable.commonLabels}
          annotations:
            vcf.vm/disk.mountPath: /sftp
            vcf.vm/disk.sizeGb: ${format('%d', input.sftpPvcSize)}
        spec:
          accessModes:
            - ReadWriteOnce
          storageClassName: ${variable.storageClass}
          resources:
            requests:
              storage: ${format('%dGi', input.sftpPvcSize)}
  SftpVM:
    type: CCI.Supervisor.Resource
    dependsOn:
      - sftpSecret
      - sftpService
      - sftpPvc
    properties:
      context: ${resource.SupervisorNamespace.id}
      wait:
        conditions:
          - type: VirtualMachineCreated
            status: 'True'
      manifest:
        apiVersion: vmoperator.vmware.com/v1alpha3
        kind: VirtualMachine
        metadata:
          name: ${variable.hostname}
          namespace: ${variable.namespace}
          labels: ${variable.commonLabels}
          annotations: ${variable.commonAnnotations}
        spec:
          className: ${input.vmClass}
          imageName: ${input.linuxImage}
          storageClass: ${variable.storageClass}
          powerState: PoweredOn
          volumes:
            - name: sftp-storage
              persistentVolumeClaim:
                claimName: pvc-sftp-${variable.hostname}
          network:
            hostName: ${variable.hostname}
            domainName: ${variable.domainName}
            nameservers:
              - ${variable.dnsServer01}
            searchDomains:
              - ${variable.domainName}
          bootstrap:
            cloudInit:
              cloudConfig:
                #cloud-config
                package_update: true
                packages:
                  - openssh-server
                disable_root: false
                ssh_pwauth: true
                groups:
                  - sftpusers
                users:
                  - name: ${input.adminUsername}
                    shell: /bin/bash
                    lock_passwd: false
                    sudo: ALL=(ALL) NOPASSWD:ALL
                    passwd:
                      name: ${variable.hostname}-secret
                      key: adminPassword
                  - name: ${input.sftpUsername}
                    lock_passwd: false
                    groups:
                      - sftpusers
                    passwd:
                      name: ${variable.hostname}-secret
                      key: sftpPassword
                write_files:
                  - path: /etc/ssh/sshd_config.d/sftp_config.conf
                    owner: root:root
                    permissions: '0644'
                    content: |
                      Match Group sftpusers
                        ChrootDirectory /sftp
                        PasswordAuthentication yes
                        PermitTunnel no
                        AllowAgentForwarding no
                        X11Forwarding no
                        AllowTcpForwarding yes
                        ForceCommand internal-sftp
                runcmd:
                  - |
                    set -eu
                    disk="$(lsblk -dnpo NAME,TYPE,MOUNTPOINT | awk '$2=="disk" && $3=="" {print $1}' | tail -n 1)"
                    if [ -n "$disk" ]; then
                      if ! blkid "$disk"; then
                        mkfs.ext4 -F "$disk"
                      fi
                      mkdir -p /sftp
                      uuid="$(blkid -s UUID -o value "$disk")"
                      if ! grep -q "$uuid" /etc/fstab; then
                        echo "UUID=$uuid /sftp ext4 defaults,nofail 0 2" >> /etc/fstab
                      fi
                      mount /sftp
                    fi
                  - mkdir -p /sftp/upload
                  - chown root:root /sftp
                  - chmod 755 /sftp /sftp/upload
                  - chown ${input.sftpUsername}:sftpusers /sftp/upload
                  - chmod 750 /sftp/upload
                  - systemctl enable ssh || systemctl enable sshd || true
                  - systemctl restart ssh || systemctl restart sshd || true
outputs:
  hostname:
    value: ${variable.hostname}
  fqdn:
    value: ${variable.fqdn}
  namespace:
    value: ${variable.namespace}
  sftpUsername:
    value: ${input.sftpUsername}
  sftpServiceName:
    value: svc-${variable.hostname}-sftp
  sftpExternalIp:
    value: ${resource.sftpService.object.status.loadBalancer.ingress[0].ip}
  sftpEndpoint:
    value: ${input.sftpUsername}@${variable.fqdn}:22
  __deploymentOverview:
    value: |-
      ## SFTP Server Deployment

      Your SFTP server deployment completed successfully.

      #### Machine Summary

      | Field | Value |
      | --- | --- |
      | Name | ${variable.hostname} |
      | FQDN | ${variable.fqdn} |
      | Operating System | Linux |
      | Image | ${input.linuxImage} |
      | Requested By | ${env.requestedBy} |
      | Namespace | ${variable.namespace} |
      | VM Class | ${input.vmClass} |
      | Storage Class | ${input.storageClass} |

      #### SFTP Access

      | Field | Value |
      | --- | --- |
      | DNS Domain | ${variable.domainName} |
      | DNS Zone | ${variable.dnsZone} |
      | Name Servers | ${variable.dnsServer01} |
      | Load Balancer Service | svc-${variable.hostname}-sftp |
      | External IP | ${resource.sftpService.object.status.loadBalancer.ingress[0].ip} |
      | Admin SSH User | ${input.adminUsername} |
      | SFTP User | ${input.sftpUsername} |
      | SFTP Endpoint | ${input.sftpUsername}@${variable.fqdn}:22 |

      #### Lifecycle Tasks

      | Task | Status |
      | --- | --- |
      | Cloud Init | Installs OpenSSH, creates the admin and SFTP users, and restarts SSH. |
      | SFTP Configuration | Configured with an SSH drop-in file for a chrooted SFTP-only user. |
      | DNS Record | Handled by post-deployment automation from the DNS payload. |
      | SFTP IP Label | vcf.vm/sftpExternalIp |
      | Upload Path | /upload |
postDeploymentPayload:
  value:
    vmName: ${variable.hostname}
    fqdn: ${variable.fqdn}
    namespace: ${variable.namespace}
    osType: linux
    workloadType: sftp
    requestedBy: ${env.requestedBy}
    domainName: ${variable.domainName}
    dnsZone: ${variable.dnsZone}
    vmClass: ${input.vmClass}
    storageClass: ${input.storageClass}
    linuxImage: ${input.linuxImage}
    sftpUsername: ${input.sftpUsername}
    sftpServiceName: svc-${variable.hostname}-sftp
    sftpExternalIp: ${resource.sftpService.object.status.loadBalancer.ingress[0].ip}
    dnsRecord:
      action: create
      type: A
      name: ${variable.hostname}
      zone: ${variable.dnsZone}
      fqdn: ${variable.fqdn}
      address: ${resource.sftpService.object.status.loadBalancer.ingress[0].ip}
    labelPatch:
      vcf.vm/sftpExternalIp: ${resource.sftpService.object.status.loadBalancer.ingress[0].ip}
      vcf.vm/fqdn: ${variable.fqdn}
    vCenterTags:
      app.kubernetes.io/name: sftp-server
      app.kubernetes.io/instance: ${variable.hostname}
      vcf.vm/vmName: ${variable.hostname}
      vcf.vm/application: ${input.application}
      vcf.vm/environment: ${input.environment}
      vcf.vm/owner: ${split(env.requestedBy, '@')[0]}
